name: tgr
description: Manage `.org` files' tags from the CLI
flags:
  -h, --help: Print help (see more with '--help')
  -V, --version: Print version
commands:
- name: count
  aliases:
  - c
  description: Print the number of tags that match <pattern>
  flags:
    -e, --exclude=: Override config by excluding files that match <PATTERN>
    -f, --file=: File where to search for tags
    -h, --help: Print help
    -i, --include=: Override config by including files that match <PATTERN>
  completion:
    flag:
      file:
      - $files
    positional:
    - []
- name: locate
  aliases:
  - l
  - loc
  description: Locate the files that contain a tag matching <PATTERN>
  flags:
    -e, --exclude=: Override config by excluding files that match <PATTERN>
    -h, --help: Print help
    -i, --include=: Override config by including files that match <PATTERN>
    -s, --strict: Match the pattern strictly or loosely
- name: refile
  aliases:
  - r
  - ref
  description: Refile org trees that have tags that match a pattern
  flags:
    -e, --exclude=: Override config by excluding files that match <PATTERN>
    -h, --help: Print help
    -i, --include=: Override config by including files that match <PATTERN>
    -n, --no-pager: Print the contents to stdout instead of pager
    -s, --strict: Match the pattern strictly or loosely
- name: search
  aliases:
  - s
  description: Search tags in Org directory or file
  flags:
    -e, --exclude=: Override config by excluding files that match <PATTERN>
    -f, --file=: File where to search for tags
    -h, --help: Print help
    -i, --include=: Override config by including files that match <PATTERN>
    -p, --pager: Force the output to a pager
  completion:
    flag:
      file:
      - $files
    positional:
    - []
- name: sed
  description: A wrapper around the `sed` cli utility to safly manipulate tags
  flags:
    -h, --help: Print help
    -v, --verbose: Print additional information about substitutions
- name: tags
  aliases:
  - t
  - tag
  description: Print tags to stdout or to pager
  flags:
    -f, --file=: Optional file to search instead of searching in the whole Org directory
    -h, --help: Print help
    -p, --pager: Force the output to a pager
    -P, --print: Print all the tags into a .txt file
  completion:
    flag:
      file:
      - $files
- name: help
  description: Print this message or the help of the given subcommand(s)
  commands:
  - name: count
    description: Print the number of tags that match <pattern>
  - name: locate
    description: Locate the files that contain a tag matching <PATTERN>
  - name: refile
    description: Refile org trees that have tags that match a pattern
  - name: search
    description: Search tags in Org directory or file
  - name: sed
    description: A wrapper around the `sed` cli utility to safly manipulate tags
  - name: tags
    description: Print tags to stdout or to pager
  - name: help
    description: Print this message or the help of the given subcommand(s)
